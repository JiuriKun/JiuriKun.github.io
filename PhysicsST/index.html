    <style>
        * {
            box-sizing: border-box;

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

        .subhead {

        .mode-btn.active {

        .question-card {

        .q-stem {

        .options {

        .opt-item .label {

        .feedback {

        }
        .feedback.show {

        .feedback .result-badge.wrong {

        .feedback .explanation {
            margin-top: 6px;

        }
        .feedback .explanation .math {
            display: inline-block;
        }

        .nav-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .nav-btn {
            padding: 10px 26px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            background: #e2ecf7;
            color: #104062;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 1 auto;
            min-width: 80px;
        }
        .nav-btn:active {
            transform: scale(0.96);
        }
        .nav-btn.primary {
            background: #1a4970;
            color: #fff;
            box-shadow: 0 4px 10px rgba(26, 73, 112, 0.2);
        }
        .nav-btn.primary:hover {
            background: #0f3b5e;
        }
        .nav-btn:disabled {

        .nav-btn.outline {

        .reset-area {

        @media (max-width: 500px) {

                font-size: 15px;
            }
            .opt-item {
                font-size: 14px;

            }
            .nav-btn {
                padding: 8px 16px;
                font-size: 14px;

            }
            .mode-btn {
                padding: 6px 14px;
                font-size: 13px;
                min-width: 70px;
            }
        }

        .math {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
        }
        .MathJax_SVG_Display {
            overflow-x: auto;
            overflow-y: hidden;
            max-width: 100%;
        }
        mjx-container {
            display: inline-block !important;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
        }
    </style>

<body>
    <div class="app" id="app">
        <h1>📘 大学物理（上） <small>70题 · 请等待题目正常渲染</small></h1>
        <div class="subhead">
            <span id="modeLabel">顺序练习</span>
            <span id="counterLabel">1 / 70</span>
        </div>

        <div class="mode-bar">
            <button class="mode-btn active" data-mode="seq" id="modeSeq">📋 顺序</button>
            <button class="mode-btn" data-mode="rand" id="modeRand">🎲 乱序</button>
        </div>

        <div class="progress-wrap">
            <span>进度</span>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <span id="progressText">0%</span>
        </div>

        <div class="question-card" id="questionCard">
            <div class="q-header" id="qHeader">第 1 题</div>
            <div class="q-stem" id="qStem">加载中...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedback">
                <div class="result-badge" id="resultBadge">✅ 正确</div>
                <div class="explanation" id="explanationText">解析内容</div>
            </div>
        </div>

        <div class="nav-row">
            <button class="nav-btn outline" id="prevBtn">◀ 上一题</button>
            <button class="nav-btn primary" id="submitBtn">提交答案</button>
            <button class="nav-btn outline" id="nextBtn">下一题 ▶</button>
        </div>

        <div class="reset-area">
            <button class="reset-btn" id="resetBtn">🔄 重新开始</button>
        </div>
        <div class="footer-note">点击选项后提交 · 支持 MathJax 渲染</div>
    </div>

    <script>
        // ============================================================
        // 请务必等待一会让公式正常渲染
        // ============================================================
        const QUESTIONS = [];

        function q(id, stem, opts, ans, exp) {
            return { id, stem, options: opts, answer: ans, explanation: exp };
        }

        // 1
        QUESTIONS.push(q(1,
            '质点沿 $x$ 轴运动时，运动方程为 $x = 2t^{2} + 6\\,(\\mathrm{m})$ ，当 $t = 1\\,\\mathrm{s}$ 时，质点的加速度大小为（  ）',
            ['$2\\,\\mathrm{m\\cdot s^{-2}}$', '$4\\,\\mathrm{m\\cdot s^{-2}}$', '$6\\,\\mathrm{m\\cdot s^{-2}}$',
                '$8\\,\\mathrm{m\\cdot s^{-2}}$'
            ],
            'B',
            '由 $x=2t^2+6$ 得 $v=4t$，$a=4\\,\\mathrm{m/s^2}$，故选 B。'
        ));
        // 2
        QUESTIONS.push(q(2,
            '一质点在 $xOy$ 平面上运动，运动函数为 $x = 2t\\,(\\mathrm{m}), y = 4t^{2} - 8\\,(\\mathrm{m})$ ，则 $t = 1\\,\\mathrm{s}$ 时的加速度为（  ）',
            ['$2\\,\\mathrm{m\\cdot s^{-2}}$', '$8\\vec{j}\\,\\mathrm{m\\cdot s^{-2}}$', '$8\\vec{i}\\,\\mathrm{m\\cdot s^{-2}}$',
                '$0\\,\\mathrm{m\\cdot s^{-2}}$'
            ],
            'B',
            '$a_x=0, a_y=8$，故 $\\vec a = 8\\vec j\\,\\mathrm{m/s^2}$。'
        ));
        // 3
        QUESTIONS.push(q(3,
            '质点作速率为 $\\nu$ 、半径为 $R$ 的变速圆周运动时的加速度大小可表示成（  ）',
            ['$\\dfrac{d\\nu}{dt}$', '$\\dfrac{\\nu^{2}}{R}$', '$\\dfrac{d\\nu}{dt} +\\dfrac{\\nu^{2}}{R}$',
                '$\\left[(\\dfrac{d\\nu}{dt})^{2} + (\\dfrac{\\nu^{2}}{R})^{2}\\right]^{1/2}$'
            ],
            'D',
            '变速圆周运动加速度包含切向 $a_t = dv/dt$ 和法向 $a_n = v^2/R$，合加速度为 $\\sqrt{a_t^2+a_n^2}$。'
        ));
        // 4
        QUESTIONS.push(q(4,
            '一质点做平面曲线运动，加速度方向始终指向曲线轨道（  ）',
            ['外侧', '内侧', '顺着曲线方向', '逆着曲线方向'],
            'B',
            '法向加速度指向曲线凹侧（内侧）。'
        ));
        // 5
        QUESTIONS.push(q(5,
            '一质点沿 $x$ 轴运动，坐标与时间的变化关系为 $x = 8t^{3} - 6t\\,(\\mathrm{m})$ ，质点在最初2s内的平均速度大小为（  ）',
            ['$52\\,\\mathrm{m\\cdot s^{-1}}$', '$26\\,\\mathrm{m\\cdot s^{-1}}$', '$90\\,\\mathrm{m\\cdot s^{-1}}$',
                '$24\\,\\mathrm{m\\cdot s^{-1}}$'
            ],
            'B',
            '$\\bar v = \\dfrac{x(2)-x(0)}{2} = \\dfrac{(8\\cdot8-12)-0}{2}=26\\,\\mathrm{m/s}$。'
        ));
        // 6
        QUESTIONS.push(q(6,
            '一质点沿 $x$ 轴运动，坐标与时间的变化关系为 $x = 2t^{3} - t\\,(\\mathrm{m})$ ，质点在最初2s内的平均速度大小为（  ）',
            ['$14\\,\\mathrm{m\\cdot s^{-1}}$', '$7\\,\\mathrm{m\\cdot s^{-1}}$', '$23\\,\\mathrm{m\\cdot s^{-1}}$',
                '$24\\,\\mathrm{m\\cdot s^{-1}}$'
            ],
            'B',
            '$\\bar v = \\dfrac{x(2)-x(0)}{2} = \\dfrac{(2\\cdot8-2)-0}{2}=7\\,\\mathrm{m/s}$。'
        ));
        // 7
        QUESTIONS.push(q(7,
            '某发动机工作时，主轴边缘一点作圆周运动，方程为 $\\theta = t^{3} + 4t + 3\\,(\\mathrm{rad})$ ，在 $t = 2\\,\\mathrm{s}$ 时，该点的角加速度大小为（  ）',
            ['$8\\,\\mathrm{rad\\cdot s^{-2}}$', '$10\\,\\mathrm{rad\\cdot s^{-2}}$', '$12\\,\\mathrm{rad\\cdot s^{-2}}$',
                '$14\\,\\mathrm{rad\\cdot s^{-2}}$'
            ],
            'C',
            '$\\omega = 3t^2+4$，$\\alpha = 6t$，$t=2$ 时 $\\alpha = 12\\,\\mathrm{rad/s^2}$。'
        ));
        // 8
        QUESTIONS.push(q(8,
            '一小球沿斜面向上运动，其运动过程为 $x = 5 + 4t - t^{2}\\,(\\mathrm{m})$ ，则小球运动到最高点的时间是（  ）',
            ['1s', '2s', '3s', '4s'],
            'B',
            '$v = 4-2t = 0 \\Rightarrow t=2$s。'
        ));
        // 9
        QUESTIONS.push(q(9,
            '一质点运动时切向加速度为恒量，法向加速度为 0，此质点做（  ）',
            ['变加速曲线运动', '匀速率圆周运动', '匀变速曲线运动', '匀变速直线运动'],
            'D',
            '$a_n=0$ 轨迹为直线，$a_t$ 恒量 -> 匀变速直线运动。'
        ));
        // 10
        QUESTIONS.push(q(10,
            '一质点运动时，$a_{n} = 0$ ，$a_{t} = c$ （ $c$ 是不为零的常数），此质点作（  ）',
            ['匀速直线运动', '匀速曲线运动', '匀变速直线运动', '不能确定'],
            'C',
            '$a_n=0$ 直线，$a_t=c\\ne0$ 匀变速直线运动。'
        ));
        // 11
        QUESTIONS.push(q(11,
            '质量为 $M$ 的木块静止在光滑的水平桌面上，质量为 $m$ ，速度为 $\\nu_{0}$ 的子弹水平地射入木块，并嵌在木块内与木块一起运动。子弹相对木块静止后，子弹的速度为（  ）',
            ['$\\dfrac{m M}{m + M}\\nu_{0}$', '$\\dfrac{m^{2}}{m + M}\\nu_{0}$', '$\\dfrac{m}{m + M}\\nu_{0}$',
                '$\\dfrac{M}{m + M}\\nu_{0}$'
            ],
            'C',
            '动量守恒：$m v_0 = (m+M)v \\Rightarrow v = \\dfrac{m}{m+M}v_0$。'
        ));
        // 12
        QUESTIONS.push(q(12,
            '质量为 $M$ 的木块静止在光滑的水平桌面上，质量为 $m$ ，速度为 $\\nu_{0}$ 的子弹水平地射入木块，并嵌在木块内与木块一起运动。子弹相对木块静止后，木块的速度为（  ）',
            ['$\\dfrac{m M}{m + M}\\nu_{0}$', '$\\dfrac{m^{2}}{m + M}\\nu_{0}$', '$\\dfrac{m}{m + M}\\nu_{0}$',
                '$\\dfrac{M}{m + M}\\nu_{0}$'
            ],
            'C',
            '木块速度与子弹相同，$v = \\dfrac{m}{m+M}v_0$。'
        ));
        // 13
        QUESTIONS.push(q(13,
            '质量为 $M$ 的木块静止在光滑的水平桌面上，质量为 $m$ ，速度为 $\\nu_{0}$ 的子弹水平地射入木块，并嵌在木块内与木块一起运动。子弹相对木块静止后，子弹的动量为（  ）',
            ['$\\dfrac{m M}{m + M}\\nu_{0}$', '$\\dfrac{m^{2}}{m + M}\\nu_{0}$', '$\\dfrac{m}{m + M}\\nu_{0}$',
                '$\\dfrac{M}{m + M}\\nu_{0}$'
            ],
            'B',
            '子弹动量 $p = m v = m \\cdot \\dfrac{m}{m+M}v_0 = \\dfrac{m^2}{m+M}v_0$。'
        ));
        // 14
        QUESTIONS.push(q(14,
            '质量为 $M$ 的木块静止在光滑的水平桌面上，质量为 $m$ ，速度为 $\\nu_{0}$ 的子弹水平地射入木块，并嵌在木块内与木块一起运动。子弹相对木块静止后，木块的动量为（  ）',
            ['$\\dfrac{m M}{m + M}\\nu_{0}$', '$\\dfrac{m^{2}}{m + M}\\nu_{0}$', '$\\dfrac{m}{m + M}\\nu_{0}$',
                '$\\dfrac{M}{m + M}\\nu_{0}$'
            ],
            'A',
            '木块动量 $p = M v = M \\cdot \\dfrac{m}{m+M}v_0 = \\dfrac{mM}{m+M}v_0$。'
        ));
        // 15
        QUESTIONS.push(q(15,
            '质量为 $M$ 的木块静止在光滑的水平桌面上，质量为 $m$ ，速度为 $\\nu_{0}$ 的子弹水平地射入木块，并嵌在木块内与木块一起运动。子弹相对木块静止后，木块的冲量为（  ）',
            ['$\\dfrac{m M}{m + M}\\nu_{0}$', '$\\dfrac{m^{2}}{m + M}\\nu_{0}$', '$\\dfrac{m}{m + M}\\nu_{0}$',
                '$\\dfrac{M}{m + M}\\nu_{0}$'
            ],
            'A',
            '木块冲量等于动量变化，$I = Mv = \\dfrac{mM}{m+M}v_0$。'
        ));
        // 16
        QUESTIONS.push(q(16,
            '下列说法中正确的是（  ）',
            ['光年是时间单位', '研究地球的自转时可以将地球看做质点', '位移是矢量', '平均速率和平均速度的大小一定不相等'],
            'C',
            '位移是矢量，描述位置变化。光年是距离单位；研究自转不能看作质点；平均速率和平均速度大小不一定相等。'
        ));
        // 17
        QUESTIONS.push(q(17,
            '一质点在 $xOy$ 平面上运动，其运动方程为 $x = r\\cos(\\omega t)$，$y = r\\sin(\\omega t)$，其中 $r$ 为常数，此质点的运动状态为（  ）',
            ['匀速直线运动', '匀加速直线运动', '圆周运动', '静止'],
            'C',
            '参数方程表示半径为 $r$ 的匀速圆周运动。'
        ));
        // 18
        QUESTIONS.push(q(18,
            '某质点的运动方程为 $\\vec{r} = 5t\\vec{i} + (15t - 5t^{2})\\vec{j}\\,(\\mathrm{m})$ ，则该质点的加速度为（  ）',
            ['大小为 $10\\,\\mathrm{m\\cdot s^{-2}}$，方向为 $y$ 轴正方向',
                '大小为 $10\\,\\mathrm{m\\cdot s^{-2}}$，方向为 $y$ 轴负方向',
                '大小为 $5\\,\\mathrm{m\\cdot s^{-2}}$，方向为 $y$ 轴正方向',
                '大小为 $5\\,\\mathrm{m\\cdot s^{-2}}$，方向为 $y$ 轴负方向'
            ],
            'B',
            '$\\vec a = -10\\vec j\\,\\mathrm{m/s^2}$，大小为 10，方向 y 轴负方向。'
        ));
        // 19
        QUESTIONS.push(q(19,
            '某质点的运动方程为 $x = 3t^{3} - 5t + 6\\,(\\mathrm{m})$ ，则该质点作（  ）',
            ['匀加速直线运动，加速度沿 $x$ 轴正方向', '匀加速直线运动，加速度沿 $x$ 轴负方向',
                '变加速直线运动，加速度沿 $x$ 轴正方向', '变加速直线运动，加速度沿 $x$ 轴负方向'
            ],
            'C',
            '$v = 9t^2-5$，$a = 18t$，$t>0$ 时 $a>0$，为变加速直线运动，加速度沿 x 轴正方向。'
        ));
        // 20

        // 64
        QUESTIONS.push(q(64,

        // 65
        QUESTIONS.push(q(65,

                '$y = 0.04\\cos(0.4\\pi t + 5\\pi x + \\frac{\\pi}{2})\\,(\\mathrm{m})$',
                '$y = 0.04\\sin(0.4\\pi t - 5\\pi x + \\frac{\\pi}{2})\\,(\\mathrm{m})$',
                '$y = 0.04\\cos(0.4\\pi t - 5\\pi x + \\frac{\\pi}{2})\\,(\\mathrm{m})$'

        QUESTIONS.push(q(66,

        QUESTIONS.push(q(67,

            '机械波速由介质性质决定，与频率无关（非色散介质）。'
        ));
        // 68
        QUESTIONS.push(q(68,
            '关于机械波描述错误的是（  ）',
            ['波动的各质元并不随波逐流，波的传播不是质元的传播',
                '"上游"的振动依次带动"下游"的质元的振动', '波源每完成一次全振动，就有一个完整的波形发送出去',

            ],
            'D',

        ));
        // 69
        QUESTIONS.push(q(69,
            '关于下列描述错误的是（  ）',
            ['在同一种介质中，波速是常量，而质点的振动速度是随时间和坐标变化的量',
                '波速是振动能量或振动形式的传播，不是质点的振动速度',
                '波速的大小由弹性介质性质决定，频率(周期)则由波源的振动特性决定',

            ],

        QUESTIONS.push(q(70,

            ],

            ['0.48', '0.50', '0.52', '0.54'],
            'C',

        QUESTIONS.push(q(72,
            '频率为 $3000\\mathrm{Hz}$ 的声波，以 $1560\\mathrm{m}\\cdot \\mathrm{s}^{-1}$ 的速度沿一波线传播，经过波线上的 $A$ 点后再经 $\\Delta x = 0.13\\mathrm{m}$ 传至 $B$ 点。则 $A$ 、 $B$ 两点振动的相位差为（  ）rad。',
            ['$\\dfrac{\\pi}{3}$', '$\\dfrac{\\pi}{2}$', '$\\dfrac{2\\pi}{3}$', '$\\dfrac{\\pi}{4}$'],
            'B',
            '由第 71 题知 $\\lambda = 0.52\\,\\mathrm{m}$，$\\Delta \\phi = \\dfrac{2\\pi}{\\lambda} \\Delta x = \\dfrac{2\\pi}{0.52} \\times 0.13 = \\dfrac{\\pi}{2}$。'
        ));

        // ============================================================
        // 应用核心逻辑
        // ============================================================
        let mode = 'seq';
        let currentIndex = 0;
        let order = [];
        let userAnswers = {};
        let submitted = {};
        let total = QUESTIONS.length;

        const modeSeq = document.getElementById('modeSeq');
        const modeRand = document.getElementById('modeRand');
        const modeLabel = document.getElementById('modeLabel');
        const counterLabel = document.getElementById('counterLabel');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const qHeader = document.getElementById('qHeader');
        const qStem = document.getElementById('qStem');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedback = document.getElementById('feedback');
        const resultBadge = document.getElementById('resultBadge');
        const explanationText = document.getElementById('explanationText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');

        function initOrder() {
            if (mode === 'seq') {
                order = Array.from({ length: total }, (_, i) => i);
            } else {
                order = Array.from({ length: total }, (_, i) => i);
                for (let i = order.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [order[i], order[j]] = [order[j], order[i]];
                }
            }
            userAnswers = {};
            submitted = {};
            currentIndex = 0;
        }

        function renderQuestion() {
            const idx = order[currentIndex];
            const q = QUESTIONS[idx];
            if (!q) return;

            qHeader.textContent = `第 ${currentIndex+1} 题（共 ${total} 题）`;
            qStem.innerHTML = q.stem;

            const labels = ['A', 'B', 'C', 'D'];
            let html = '';
            const selected = userAnswers[idx] || null;
            const isSubmitted = submitted[idx] || false;

            for (let i = 0; i < q.options.length; i++) {
                let cls = 'opt-item';
                if (selected === labels[i]) cls += ' selected';
                if (isSubmitted) {
                    cls += ' disabled';
                    if (labels[i] === q.answer) cls += ' correct';
                    if (selected === labels[i] && selected !== q.answer) cls += ' wrong';
                }
                html += `
                    <div class="${cls}" data-opt="${labels[i]}" data-idx="${idx}">
                        <span class="label">${labels[i]}.</span>
                        <span class="content">${q.options[i]}</span>
                    </div>
                `;
            }
            optionsContainer.innerHTML = html;

            if (!isSubmitted) {
                document.querySelectorAll('.opt-item').forEach(el => {
                    el.addEventListener('click', function(e) {
                        const idx2 = parseInt(this.dataset.idx);
                        const opt = this.dataset.opt;
                        if (submitted[idx2]) return;
                        userAnswers[idx2] = opt;
                        renderQuestion();
                    });
                });
            }

            if (isSubmitted) {
                const correct = q.answer;
                const isCorrect = (selected === correct);
                resultBadge.textContent = isCorrect ? '✅ 回答正确' : '❌ 回答错误';
                resultBadge.className = 'result-badge ' + (isCorrect ? 'correct' : 'wrong');
                explanationText.innerHTML = q.explanation;
                feedback.className = 'feedback show';
            } else {
                feedback.className = 'feedback';
            }

            const answered = Object.keys(submitted).length;
            const pct = Math.round((answered / total) * 100);
            progressFill.style.width = pct + '%';
            progressText.textContent = pct + '%';
            counterLabel.textContent = `${currentIndex+1} / ${total}`;

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === total - 1;

            if (isSubmitted) {
                submitBtn.textContent = '✅ 已作答';
                submitBtn.style.opacity = '0.6';
            } else {
                submitBtn.textContent = '📝 提交答案';
                submitBtn.style.opacity = '1';
            }

            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetPromise().catch(() => {});
            }
        }

        function handleSubmit() {
            const idx = order[currentIndex];
            if (submitted[idx]) {
                if (currentIndex < total - 1) {
                    currentIndex++;
                    renderQuestion();
                }
                return;
            }
            const selected = userAnswers[idx];
            if (!selected) {
                alert('请先选择一个选项！');
                return;
            }
            submitted[idx] = true;
            renderQuestion();
        }

        function switchMode(newMode) {
            if (newMode === mode) return;
            mode = newMode;
            modeSeq.classList.toggle('active', mode === 'seq');
            modeRand.classList.toggle('active', mode === 'rand');
            modeLabel.textContent = mode === 'seq' ? '顺序练习' : '乱序练习';
            initOrder();
            renderQuestion();
        }

        function resetAll() {
            initOrder();
            renderQuestion();
        }

        function goPrev() {
            if (currentIndex > 0) { currentIndex--;
                renderQuestion(); }
        }

        function goNext() {
            if (currentIndex < total - 1) { currentIndex++;
                renderQuestion(); }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') goPrev();
            else if (e.key === 'ArrowRight') goNext();
            else if (e.key === 'Enter') handleSubmit();
        });

        modeSeq.addEventListener('click', () => switchMode('seq'));
        modeRand.addEventListener('click', () => switchMode('rand'));
        prevBtn.addEventListener('click', goPrev);
        nextBtn.addEventListener('click', goNext);
        submitBtn.addEventListener('click', handleSubmit);
        resetBtn.addEventListener('click', resetAll);

        initOrder();
        renderQuestion();
        console.log('✅ 大学物理刷题已启动，共 ' + total + ' 题');
    </script>
