<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中国近现代史纲要 · 刷题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            padding: 0 0 80px 0;
            min-height: 100vh;
        }
        .app-header {
            background: linear-gradient(135deg, #8B0000, #5a0000);
            color: #fff;
            padding: 16px 20px 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .app-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .app-header .sub {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 2px;
            font-weight: 400;
        }

        .mode-tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e8ecf1;
            position: sticky;
            top: 68px;
            z-index: 99;
            background: #f8f9fc;
            padding: 6px 12px;
            gap: 6px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        .mode-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.3px;
            touch-action: manipulation;
        }
        .mode-tab:active {
            transform: scale(0.96);
        }
        .mode-tab.active {
            background: #8B0000;
            color: #fff;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.3);
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 16px 16px 20px;
        }

        .progress-bar-wrap {
            background: #e8ecf1;
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
            margin-bottom: 14px;
            position: relative;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #8B0000, #c0392b);
            border-radius: 20px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 6px;
        }
        .progress-text .num {
            font-weight: 600;
            color: #1a1a2e;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 22px 20px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #8B0000;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .badge {
            background: #8B0000;
            color: #fff;
            font-size: 11px;
            padding: 1px 10px;
            border-radius: 30px;
            font-weight: 500;
        }
        .question-text {
            font-size: 17px;
            line-height: 1.8;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 18px;
            word-break: break-word;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 16px;
            background: #f8f9fc;
            border-radius: 12px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            font-size: 15px;
            line-height: 1.6;
            color: #1a1a2e;
        }
        .option-item:active {
            transform: scale(0.98);
        }
        .option-item .label {
            font-weight: 700;
            color: #6b7280;
            flex-shrink: 0;
            min-width: 22px;
        }
        .option-item .text {
            flex: 1;
        }
        .option-item.selected {
            border-color: #8B0000;
            background: #fde8e8;
        }
        .option-item.correct {
            border-color: #22c55e;
            background: #e6f9ed;
        }
        .option-item.correct .label {
            color: #22c55e;
        }
        .option-item.wrong {
            border-color: #ef4444;
            background: #fde8e8;
        }
        .option-item.wrong .label {
            color: #ef4444;
        }
        .option-item.reveal-correct {
            border-color: #22c55e;
            background: #e6f9ed;
        }
        .option-item.reveal-correct .label {
            color: #22c55e;
        }
        .option-item.disabled {
            cursor: default;
            opacity: 0.7;
        }
        .option-item.disabled:active {
            transform: none;
        }

        .feedback {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            background: #f8f9fc;
            border-left: 4px solid #8B0000;
            display: none;
        }
        .feedback.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .feedback .result-label {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 4px;
        }
        .feedback .result-label .icon {
            margin-right: 6px;
        }
        .feedback .correct-answer {
            font-size: 14px;
            color: #22c55e;
            font-weight: 600;
        }
        .feedback .explanation {
            font-size: 14px;
            color: #4b5563;
            margin-top: 6px;
            line-height: 1.7;
        }
        .feedback.correct {
            border-left-color: #22c55e;
            background: #f0fdf4;
        }
        .feedback.correct .result-label {
            color: #22c55e;
        }
        .feedback.wrong {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        .feedback.wrong .result-label {
            color: #ef4444;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 80px;
            padding: 14px 10px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            text-align: center;
            background: #e8ecf1;
            color: #4b5563;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #8B0000;
            color: #fff;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.25);
        }
        .btn-primary:active {
            background: #6b0000;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }
        .btn-success {
            background: #22c55e;
            color: #fff;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.25);
        }
        .btn-success:active {
            background: #16a34a;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #8B0000;
            color: #8B0000;
        }
        .btn-outline:active {
            background: #8B000010;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        .btn-secondary:active {
            background: #e5e7eb;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.25);
        }
        .btn-danger:active {
            background: #b91c1c;
        }

        .result-summary {
            text-align: center;
            padding: 24px 0 12px;
        }
        .result-summary .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8B0000, #5a0000);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 30px rgba(139, 0, 0, 0.3);
        }
        .result-summary .score-circle .big {
            font-size: 38px;
            font-weight: 800;
            line-height: 1;
        }
        .result-summary .score-circle .small {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }
        .result-summary .msg {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
        }
        .result-summary .sub-msg {
            font-size: 14px;
            color: #6b7280;
            margin-top: 4px;
        }

        .result-item {
            background: #f8f9fc;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-left: 4px solid #e8ecf1;
        }
        .result-item.correct-item {
            border-left-color: #22c55e;
            background: #f0fdf4;
        }
        .result-item.wrong-item {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        .result-item .q {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 4px;
            line-height: 1.6;
        }
        .result-item .ans {
            font-size: 13px;
            color: #4b5563;
        }
        .result-item .ans .user-ans {
            font-weight: 600;
        }
        .result-item .ans .user-ans.correct-text {
            color: #22c55e;
        }
        .result-item .ans .user-ans.wrong-text {
            color: #ef4444;
        }
        .result-item .exp {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
            line-height: 1.6;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 16px;
        }

        .hidden {
            display: none !important;
        }

        .mt-2 {
            margin-top: 8px;
        }
        .mt-3 {
            margin-top: 16px;
        }
        .text-center {
            text-align: center;
        }
        .gap-2 {
            gap: 8px;
        }

        .quiz-progress {
            font-size: 13px;
            color: #6b7280;
            text-align: center;
            padding: 6px 0 10px;
            font-weight: 500;
        }
        .quiz-progress span {
            color: #8B0000;
            font-weight: 700;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c4c8d4;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px 12px 20px;
            }
            .card {
                padding: 18px 16px 16px;
            }
            .question-text {
                font-size: 16px;
            }
            .option-item {
                padding: 11px 14px;
                font-size: 14px;
            }
            .mode-tab {
                font-size: 13px;
                padding: 8px 0;
            }
            .app-header h1 {
                font-size: 18px;
            }
            .result-summary .score-circle {
                width: 100px;
                height: 100px;
            }
            .result-summary .score-circle .big {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>📜 中国近现代史纲要</h1>
        <div class="sub">60题 · 三种刷题模式</div>
    </div>

    <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="order">📋 顺序</button>
        <button class="mode-tab" data-mode="random">🎲 乱序</button>
        <button class="mode-tab" data-mode="quiz">📝 模拟测验</button>
    </div>

    <div class="container" id="appContainer"></div>

    <script>
        // ======================== 题库数据 ========================
        const QUESTIONS = [{
            id: 1,
            q: '一百年来，中国共产党团结带领中国人民进行的一切奋斗、一切牺牲、一切创造，归结起来就是一个主题（  ）。',
            opts: ['A. 人民幸福、国家富强', 'B. 实现中华民族伟大复兴', 'C. 民族独立、人民解放',
                'D. 推翻封建主义和帝国主义双重压迫'
            ],
            ans: 1,
            exp: '习近平总书记在"七一"重要讲话中指出，一百年来中国共产党的一切奋斗、牺牲和创造，归结起来就是一个主题：实现中华民族伟大复兴。'
        }, {
            id: 2,
            q: '近代中国诞生的新兴的被压迫阶级是（  ）。',
            opts: ['A. 资产阶级', 'B. 地主阶级', 'C. 工人阶级', 'D. 农民阶级'],
            ans: 2,
            exp: '中国工人阶级是近代中国诞生的新兴被压迫阶级，是先进生产力的代表，具有最彻底的革命性，是中国革命的领导力量。'
        }, {
            id: 3,
            q: '资本---帝国主义列强侵略中国的主要目的是（  ）。',
            opts: ['A. 开拓疆土', 'B. 强迫中国成为其附属国', 'C. 开辟市场', 'D. 掠夺资源'],
            ans: 1,
            exp: '资本—帝国主义列强侵略中国的主要目的是强迫中国成为其附属国，通过不平等条约控制中国的政治、经济命脉，使中国沦为半殖民地半封建社会。'
        }, {
            id: 4,
            q: '中国近代史的开端是在（  ）。',
            opts: ['A. 1919年', 'B. 1949年', 'C. 1915年', 'D. 1840年'],
            ans: 3,
            exp: '1840年鸦片战争是中国近代史的开端。鸦片战争后，中国开始从封建社会沦为半殖民地半封建社会，社会性质发生根本变化。'
        }, {
            id: 5,
            q: '中国在半殖民地半封建社会时期，反侵略斗争失败的最根本原因是（  ）。',
            opts: ['A. 军事装备落后', 'B. 经济技术落后', 'C. 社会制度腐败', 'D. 思想文化保守'],
            ans: 2,
            exp: '反侵略斗争失败的最根本原因是社会制度的腐败。清政府的腐败无能、封建专制制度的落后，导致国家无法有效动员和组织人民进行抵抗。'
        }, {
            id: 6,
            q: '太平天国运动不同于以前农民战争的特点是（  ）。',
            opts: ['A. 有了反封建内容', 'B. 有了反侵略爱国内容', 'C. 有了资产阶级领导', 'D. 有了无产阶级领导'],
            ans: 1,
            exp: '太平天国运动不仅反对封建统治，还肩负起反侵略的爱国任务，这是以往农民战争所不具备的新特点，体现了时代的变化。'
        }, {
            id: 7,
            q: '在近代中国，实现国家富强和人民幸福的前提是（  ）。',
            opts: ['A. 进行实业救国', 'B. 实行资本主义', 'C. 进行西方式的工业革命', 'D. 争取民族独立和人民解放'],
            ans: 3,
            exp: '民族独立和人民解放是实现国家富强和人民幸福的前提。只有推翻帝国主义和封建主义的统治，才能为现代化建设创造基本条件。'
        }, {
            id: 8,
            q: '1907年兴起的"庚款兴学"的实质是（  ）。',
            opts: ['A. 帝国主义文化侵略', 'B. 效法西方社会建设', 'C. 推动近代教育转型', 'D. 促进东西方文化交融'],
            ans: 0,
            exp: '"庚款兴学"是帝国主义国家利用庚子赔款在中国兴办学校的活动，其本质是文化侵略，旨在培养为帝国主义服务的代理人。'
        }, {
            id: 9,
            q: '维新变法时期，维新派提出的政治主张是（  ）。',
            opts: ['A. 宪政民主', 'B. 民主共和', 'C. 人民民主', 'D. 君主立宪'],
            ans: 3,
            exp: '维新派主张在中国实行君主立宪制，即在保留君主的前提下，建立议会制度，实行宪政改革，这是维新变法的核心政治主张。'
        }, {
            id: 10,
            q: '中国近代史上提出"以中国之伦常名教为原本，辅以诸国富强之术"之说的思想家是（  ）。',
            opts: ['A. 李鸿章', 'B. 左宗棠', 'C. 冯桂芬', 'D. 张之洞'],
            ans: 2,
            exp: '冯桂芬在《校邠庐抗议》中提出"以中国之伦常名教为原本，辅以诸国富强之术"，成为洋务运动"中体西用"思想的重要来源。'
        }, {
            id: 11,
            q: '近代中国首先喊出"振兴中华"口号的人是（  ）。',
            opts: ['A. 孙中山', 'B. 林则徐', 'C. 严复', 'D. 康有为'],
            ans: 0,
            exp: '孙中山在1894年兴中会成立时提出"振兴中华"的口号，成为中国近代民族复兴思想的重要标志，激励了无数仁人志士。'
        }, {
            id: 12,
            q: '近代中国第一个领导资产阶级革命的全国性政党是（  ）。',
            opts: ['A. 兴中会', 'B. 中华革命党', 'C. 光复会', 'D. 中国同盟会'],
            ans: 3,
            exp: '1905年成立的中国同盟会是近代中国第一个全国性的资产阶级革命政党，以"驱除鞑虏，恢复中华，创立民国，平均地权"为纲领。'
        }, {
            id: 13,
            q: '提出"建设有中国特色的社会主义"重大命题的会议是（  ）。',
            opts: ['A. 中共八大', 'B. 中共十三大', 'C. 中共十四大', 'D. 中共十二大'],
            ans: 3,
            exp: '1982年中共十二大，邓小平首次提出"建设有中国特色的社会主义"这一重大命题，标志着中国特色社会主义理论的正式形成。'
        }, {
            id: 14,
            q: '改革开放以来，党的全部理论与实践的主题是（  ）。',
            opts: ['A. 民族独立', 'B. 为人民谋和平', 'C. 国家富强', 'D. 中国特色社会主义'],
            ans: 3,
            exp: '改革开放以来，党的全部理论和实践的主题是中国特色社会主义，这是改革开放和现代化建设的根本方向。'
        }, {
            id: 15,
            q: '标志着国民党政权在大陆统治覆灭的重大事件是（  ）。',
            opts: ['A. 1949年上海解放', 'B. 1949年南京解放', 'C. 1949年河北解放', 'D. 1949年北平解放'],
            ans: 1,
            exp: '1949年4月23日南京解放，标志着国民党22年在大陆统治的覆灭，是中国人民解放军在解放战争中的重大胜利。'
        }, {
            id: 16,
            q: '1946年6月26日，国民党军队挑起全国性内战的起点是大举进攻（  ）。',
            opts: ['A. 东北解放区', 'B. 中原解放区', 'C. 陕北解放区', 'D. 山东解放区'],
            ans: 1,
            exp: '1946年6月26日，国民党军队以22万人进攻中原解放区，标志着全面内战的爆发，是解放战争的开端。'
        }, {
            id: 17,
            q: '中国共产党从大革命失败到土地革命战争兴起的转折是（  ）。',
            opts: ['A. 南昌起义', 'B. 三湾改编', 'C. 八七会议', 'D. 古田会议'],
            ans: 2,
            exp: '1927年8月7日的八七会议是中国共产党从大革命失败到土地革命战争兴起的历史性转折，确定了土地革命和武装斗争的方针。'
        }, {
            id: 18,
            q: '中国共产党独立领导革命战争和创建人民军队的开始是（  ）。',

        function resetRandomState() {
            state.shuffledIndices = [];
            state.currentIndex = 0;
            state.answers = new Array(QUESTIONS.length).fill(undefined);
            state.answered = new Array(QUESTIONS.length).fill(false);
            state.isCompleted = false;
        }

        function resetQuizState() {
            state.quizQuestions = [];
            state.quizAnswers = [];
            state.quizAnswered = [];
            state.quizCompleted = false;
            state.quizScore = 0;
            state.currentIndex = 0;
        }

        // ======================== 模式切换 ========================
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                const mode = this.dataset.mode;
                if (mode === state.mode) return;
                state.mode = mode;
                if (mode === 'order') resetOrderState();
                else if (mode === 'random') resetRandomState();
                else if (mode === 'quiz') resetQuizState();
                render();
            });
        });

        // ======================== 初始化 ========================
        function init() {
            resetOrderState();
            render();
        }
        init();
    </script>
</body>
</html>
